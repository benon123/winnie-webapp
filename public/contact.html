<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact | Coursework Submission</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark" style="background-color:#1a237e;">

    <div class="container">
        <a class="navbar-brand fw-bold" href="/">WebDev Assignment</a>
        <div>
            <a class="nav-link d-inline text-white" href="/">Home</a>
            <a class="nav-link d-inline text-white" href="about.html">About</a>
            <a class="nav-link d-inline text-white" href="contact.html">Contact</a>
        </div>
    </div>
</nav>

<div class="container my-5">
    <div class="card shadow p-4">
        <h2 class="text-center mb-4">Contact Form</h2>

        <p>
            Please fill in your credentials here.
        </p>

        <form action="/contact" method="POST">
            <div class="mb-3">
                <input type="text" class="form-control" name="name" placeholder="Full Name" required>
            </div>

            <div class="mb-3">
                <input type="email" class="form-control" name="email" placeholder="Email Address" required>
            </div>

            <div class="mb-3">
                <textarea class="form-control" name="message" rows="4" placeholder="Your Message" required></textarea>
            </div>

            <button class="btn w-100" style="background-color:#0d133d; color:white;">
            Submit
            </button>
        </form>
    </div>
</div>

<footer style="background-color:#0d133d; color:white; text-align:center; padding:15px;">
    © 2026 Programming Principles Coursework
</footer>

</body>
</html>
